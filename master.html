<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Master — Rastreio em Tempo Real</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Rajdhani:wght@700;800&family=Inter:wght@400;500;600&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#060d18;--bg2:#0b1524;--bg3:#102030;--bg4:#152840;--bd:#162840;--b2:#1e3a58;--tx:#e2eeff;--t2:#7a9fd4;--t3:#3a5880;--bl:#00d4ff;--gr:#00e896;--ye:#ffd000;--rd:#ff4466;--pu:#a78bfa;--or:#fb923c;--r:12px;--rs:8px}
body{background:var(--bg);color:var(--tx);font-family:'Inter',sans-serif;min-height:100vh}
.top{background:var(--bg2);border-bottom:2px solid var(--bl);height:56px;display:flex;align-items:center;padding:0 20px;position:sticky;top:0;z-index:200;gap:12px}
.logo{font-family:'Rajdhani',sans-serif;font-size:18px;font-weight:800;color:var(--bl);flex:1;letter-spacing:1px}
.live{display:flex;align-items:center;gap:6px;font-size:12px;font-weight:600;color:var(--gr)}
.dot{width:8px;height:8px;background:var(--gr);border-radius:50%;animation:pu 1.4s ease-in-out infinite}
@keyframes pu{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.3;transform:scale(1.5)}}
.wrap{max-width:1400px;margin:0 auto;padding:20px 16px}
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(100px,1fr));gap:10px;margin-bottom:20px}
.st{background:var(--bg2);border:1px solid var(--bd);border-radius:var(--r);padding:14px;text-align:center;position:relative}
.st::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;border-radius:var(--r) var(--r) 0 0}
.s0::before{background:var(--bl)}.s1::before{background:var(--ye)}.s2::before{background:var(--rd)}
.s3::before{background:var(--pu)}.s4::before{background:var(--or)}.s5::before{background:var(--gr)}
.sv{font-family:'Rajdhani',sans-serif;font-size:28px;font-weight:800}
.s0 .sv{color:var(--bl)}.s1 .sv{color:var(--ye)}.s2 .sv{color:var(--rd)}
.s3 .sv{color:var(--pu)}.s4 .sv{color:var(--or)}.s5 .sv{color:var(--gr)}
.sl{font-size:9px;color:var(--t2);text-transform:uppercase;letter-spacing:.4px;margin-top:2px}
.frow{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap}
.fi{background:var(--bg3);border:1px solid var(--b2);border-radius:var(--rs);color:var(--tx);padding:8px 13px;font-size:12px;font-family:'Inter',sans-serif;outline:none;flex:1;min-width:160px}
.fi:focus{border-color:var(--bl)}
.fb{padding:7px 13px;border:1px solid var(--bd);border-radius:20px;background:transparent;color:var(--t2);font-size:10px;font-weight:600;cursor:pointer;transition:all .2s;text-transform:uppercase}
.fb.on,.fb:hover{border-color:var(--bl);color:var(--bl);background:rgba(0,212,255,.07)}
.tcard{background:var(--bg2);border:1px solid var(--bd);border-radius:var(--r);overflow:hidden;margin-bottom:16px}
.thead{padding:14px 18px;font-family:'Rajdhani',sans-serif;font-size:14px;font-weight:700;border-bottom:1px solid var(--bd);display:flex;justify-content:space-between;align-items:center}
.thead small{font-size:11px;color:var(--t2);font-weight:400;font-family:'Inter',sans-serif}
.tscroll{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:11px}
th{text-align:left;font-size:9px;font-weight:600;color:var(--t3);text-transform:uppercase;padding:9px 14px;border-bottom:1px solid var(--bd);white-space:nowrap}
td{padding:11px 14px;border-bottom:1px solid var(--bd);vertical-align:top}
tr:last-child td{border-bottom:none}
tr:hover td{background:var(--bg3)}
.ptag{font-family:'Rajdhani',sans-serif;font-weight:700;font-size:14px;letter-spacing:1px;background:var(--bg4);border:1px solid var(--b2);border-radius:5px;padding:2px 9px;display:inline-block;color:var(--bl)}
.pill{display:inline-flex;align-items:center;gap:3px;padding:3px 9px;border-radius:20px;font-size:9px;font-weight:700;text-transform:uppercase;white-space:nowrap;border:1px solid}
.p-bl{background:rgba(0,212,255,.1);color:var(--bl);border-color:rgba(0,212,255,.2)}
.p-ye{background:rgba(255,208,0,.1);color:var(--ye);border-color:rgba(255,208,0,.2)}
.p-rd{background:rgba(255,68,102,.1);color:var(--rd);border-color:rgba(255,68,102,.2)}
.p-pu{background:rgba(167,139,250,.1);color:var(--pu);border-color:rgba(167,139,250,.2)}
.p-gr{background:rgba(0,232,150,.1);color:var(--gr);border-color:rgba(0,232,150,.2)}
.ec{font-size:11px;color:var(--t2);line-height:1.9}
.ec .d{color:var(--tx)}.ec .w{color:var(--t3);font-style:italic}
.dr{background:rgba(0,212,255,.1);color:var(--bl);border-radius:4px;padding:0 4px;font-size:10px;margin-left:3px}
.empty{text-align:center;padding:48px;color:var(--t3)}
.spin{width:28px;height:28px;border:3px solid var(--bd);border-top-color:var(--bl);border-radius:50%;animation:ro .7s linear infinite;margin:40px auto 10px}
@keyframes ro{to{transform:rotate(360deg)}}
.cards{display:none;flex-direction:column;gap:10px}
.crd{background:var(--bg2);border:1px solid var(--bd);border-radius:var(--r);padding:14px}
.crd-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px}
.crd-pl{font-family:'Rajdhani',sans-serif;font-size:20px;font-weight:800;color:var(--bl);letter-spacing:1px}
.crd-sub{font-size:11px;color:var(--t2);margin-bottom:8px}
.crd-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.crd-et{background:var(--bg3);border:1px solid var(--bd);border-radius:var(--rs);padding:7px 10px}
.crd-et .el{color:var(--t3);font-size:9px;text-transform:uppercase;letter-spacing:.4px;margin-bottom:3px}
.crd-et .ei{font-size:11px;font-weight:600;color:var(--tx)}
.crd-et .ei.w{color:var(--t3);font-style:italic;font-weight:400}
.crd-et .ed{font-size:10px;color:var(--bl);margin-top:1px}
@media(max-width:768px){.tcard{display:none}.cards{display:flex}.stats{grid-template-columns:repeat(3,1fr)}}
</style>
</head>
<body>
<div class="top">
  <div class="logo">👁️ MASTER — RASTREIO EM TEMPO REAL</div>
  <div class="live"><div class="dot"></div>AO VIVO</div>
</div>
<div class="wrap">
  <div class="stats">
    <div class="st s0"><div class="sv" id="s0">—</div><div class="sl">Total</div></div>
    <div class="st s1"><div class="sv" id="s1">—</div><div class="sl">Triagem</div></div>
    <div class="st s2"><div class="sv" id="s2">—</div><div class="sl">Carga</div></div>
    <div class="st s3"><div class="sv" id="s3">—</div><div class="sl">Enlone</div></div>
    <div class="st s4"><div class="sv" id="s4">—</div><div class="sl">Ag.Saída</div></div>
    <div class="st s5"><div class="sv" id="s5">—</div><div class="sl">Concluído</div></div>
  </div>
  <div class="frow">
    <input class="fi" id="q" type="text" placeholder="🔍 Placa ou AC..." oninput="render()"/>
    <button class="fb on" onclick="setF('t',this)">Todos</button>
    <button class="fb" onclick="setF('a',this)">Em processo</button>
    <button class="fb" onclick="setF('c',this)">Concluídos</button>
  </div>
  <div class="tcard">
    <div class="thead">📋 Caminhões Hoje <small id="cnt"></small></div>
    <div id="ld"><div class="spin"></div></div>
    <div class="tscroll" id="tbl" style="display:none">
      <table>
        <thead><tr>
          <th>Placa</th><th>AC</th><th>Entrada</th><th>Setor Atual</th>
          <th>📦 Triagem Ini</th><th>📦 Triagem Fim</th>
          <th>🏗️ Carga Ini</th><th>🏗️ Carga Fim</th>
          <th>🪢 Enlone Ini</th><th>🪢 Enlone Fim</th>
          <th>🧾 Saída</th>
        </tr></thead>
        <tbody id="tbody"></tbody>
      </table>
    </div>
    <div class="empty" id="emp" style="display:none">🔍 Nenhum resultado.</div>
  </div>
  <div class="cards" id="cards"></div>
</div>
<script type="module">
import{initializeApp}from"https://www.gstatic.com/firebasejs/10.11.0/firebase-app.js";import{getFirestore,collection,onSnapshot,query,orderBy}from"https://www.gstatic.com/firebasejs/10.11.0/firebase-firestore.js";
const app=initializeApp({apiKey:"AIzaSyCMacFP0kGkgOTCqdWzf6Y65LN2q4tw28Y",authDomain:"cimento-6163b.firebaseapp.com",projectId:"cimento-6163b",storageBucket:"cimento-6163b.firebasestorage.app",messagingSenderId:"773785464621",appId:"1:773785464621:web:02dc9de04a7e2af231ada4"});
const db=getFirestore(app);
const hoje=()=>new Date().toISOString().split("T")[0];
const fmt=d=>d?d.toLocaleString("pt-BR",{day:"2-digit",month:"2-digit",hour:"2-digit",minute:"2-digit",second:"2-digit"}):"—";
const fmtT=d=>d?d.toLocaleTimeString("pt-BR",{hour:"2-digit",minute:"2-digit",second:"2-digit"}):"—";
function durStr(ms){if(!ms||ms<0)return"";const m=Math.round(ms/60000);return m<60?m+"min":Math.floor(m/60)+"h"+m%60+"m";}
function pill(s){
  if(!s||s==="posto1")return`<span class="pill p-bl">🔵 Entrada</span>`;
  if(s==="triagem_inicio")return`<span class="pill p-ye">🟡 Em Triagem</span>`;
  if(s==="triagem_fim")return`<span class="pill p-ye">🟡 Triagem OK</span>`;
  if(s==="carregamento_inicio")return`<span class="pill p-rd">🔴 Carregando</span>`;
  if(s==="carregamento_fim")return`<span class="pill p-rd">🔴 Carregado</span>`;
  if(s==="enlonamento_inicio")return`<span class="pill p-pu">🟣 Enlonando</span>`;
  if(s==="enlonamento_fim")return`<span class="pill p-pu">🟣 Enlonado</span>`;
  if(s==="concluido")return`<span class="pill p-gr">🟢 Concluído</span>`;
  return`<span class="pill p-bl">${s}</span>`;
}
function getTS(c,sn,f){const v=c[sn]?.[f];return v?.toDate?v.toDate():null;}
let HD=[],MF="t";
onSnapshot(query(collection(db,"caminhoes_rastreio"),orderBy("criadoEm","desc")),snap=>{
  HD=snap.docs.map(d=>({id:d.id,...d.data()})).filter(c=>c.data===hoje());
  render();
  document.getElementById("ld").style.display="none";
  document.getElementById("tbl").style.display="block";
});
window.setF=(f,el)=>{MF=f;document.querySelectorAll(".fb").forEach(b=>b.classList.remove("on"));el.classList.add("on");render();};
window.render=()=>{
  document.getElementById("s0").textContent=HD.length;
  document.getElementById("s1").textContent=HD.filter(c=>c.setorAtual?.startsWith("triagem")).length;
  document.getElementById("s2").textContent=HD.filter(c=>c.setorAtual?.startsWith("carregamento")).length;
  document.getElementById("s3").textContent=HD.filter(c=>c.setorAtual?.startsWith("enlonamento")).length;
  document.getElementById("s4").textContent=HD.filter(c=>c.setorAtual==="enlonamento_fim").length;
  document.getElementById("s5").textContent=HD.filter(c=>c.setorAtual==="concluido").length;
  const q=(document.getElementById("q")?.value||"").toUpperCase();
  let list=[...HD];
  if(MF==="a")list=list.filter(c=>c.setorAtual!=="concluido");
  if(MF==="c")list=list.filter(c=>c.setorAtual==="concluido");
  if(q)list=list.filter(c=>c.placa?.includes(q)||c.ac?.includes(q));
  document.getElementById("cnt").textContent=list.length+" caminhão"+(list.length!==1?"s":"");
  const tb=document.getElementById("tbody"),em=document.getElementById("emp"),cards=document.getElementById("cards");
  if(!list.length){tb.innerHTML="";em.style.display="block";cards.innerHTML="<div class='empty'>🔍 Nenhum resultado.</div>";return;}
  em.style.display="none";
  function cell(d,d2){
    if(!d)return`<span class="w">aguardando</span>`;
    let s=`<span class="d">${fmt(d)}</span>`;
    if(d2)s+=`<span class="dr">${durStr(d-d2)}</span>`;
    return s;
  }
  tb.innerHTML=list.map(c=>{
    const en=getTS(c,"entrada","ts");
    const trI=getTS(c,"triagem","inicio"),trF=getTS(c,"triagem","fim");
    const caI=getTS(c,"carregamento","inicio"),caF=getTS(c,"carregamento","fim");
    const enI=getTS(c,"enlonamento","inicio"),enF=getTS(c,"enlonamento","fim");
    const sa=getTS(c,"faturamento","ts");
    return`<tr>
      <td><span class="ptag">${c.placa}</span></td>
      <td style="color:var(--t2)">${c.ac}</td>
      <td class="ec">${en?`<span class="d">${fmtT(en)}</span>`:"—"}</td>
      <td>${pill(c.setorAtual)}</td>
      <td class="ec">${cell(trI,null)}</td>
      <td class="ec">${cell(trF,trI)}</td>
      <td class="ec">${cell(caI,null)}</td>
      <td class="ec">${cell(caF,caI)}</td>
      <td class="ec">${cell(enI,null)}</td>
      <td class="ec">${cell(enF,enI)}</td>
      <td class="ec">${sa?`<span class="d">${fmtT(sa)}</span>`:`<span class="w">aguardando</span>`}</td>
    </tr>`;
  }).join("");
  cards.innerHTML=list.map(c=>{
    const en=getTS(c,"entrada","ts");
    const sa=getTS(c,"faturamento","ts");
    const etapas=[["📦 Triagem","triagem"],["🏗️ Carga","carregamento"],["🪢 Enlone","enlonamento"]].map(([lb,sn])=>{
      const ini=getTS(c,sn,"inicio"),fim=getTS(c,sn,"fim");
      const d=ini&&fim?durStr(fim-ini):"";
      return`<div class="crd-et"><div class="el">${lb}</div>
        <div class="ei ${ini?"":"w"}">▶ ${ini?fmtT(ini):"aguardando"}</div>
        <div class="ei ${fim?"":"w"}">⏹ ${fim?fmtT(fim):"aguardando"}</div>
        ${d?`<div class="ed">⏱ ${d}</div>`:""}
      </div>`;
    }).join("");
    return`<div class="crd">
      <div class="crd-top"><span class="crd-pl">${c.placa}</span>${pill(c.setorAtual)}</div>
      <div class="crd-sub">AC: ${c.ac} · Entrada: ${en?fmtT(en):"—"}</div>
      <div class="crd-grid">${etapas}</div>
      ${sa?`<div style="font-size:11px;color:var(--gr);margin-top:8px;font-weight:700">🧾 Saída: ${fmtT(sa)}</div>`:""}
    </div>`;
  }).join("");
};
</script>
</body></html>
