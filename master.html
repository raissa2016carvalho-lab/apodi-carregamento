<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>👁️ Master — Rastreio em Tempo Real</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Rajdhani:wght@600;700;800&family=Inter:wght@400;500;600&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#060d18;--bg2:#0b1524;--bg3:#102030;--bg4:#152840;--bd:#162840;--b2:#1e3a58;--tx:#e2eeff;--t2:#7a9fd4;--t3:#3a5880;--bl:#00d4ff;--gr:#00e896;--ye:#ffd000;--rd:#ff4466;--pu:#a78bfa;--or:#fb923c;--r:12px;--rs:8px}
body{background:var(--bg);color:var(--tx);font-family:'Inter',sans-serif;min-height:100vh}
.top{background:var(--bg2);border-bottom:2px solid var(--bl);height:52px;display:flex;align-items:center;padding:0 16px;position:sticky;top:0;z-index:200}
.logo{font-family:'Rajdhani',sans-serif;font-size:18px;font-weight:800;color:var(--bl);letter-spacing:1px;flex:1}
.live{display:flex;align-items:center;gap:6px;font-size:11px;font-weight:600;color:var(--gr)}
.ldot{width:7px;height:7px;background:var(--gr);border-radius:50%;animation:pu 1.5s ease-in-out infinite}
@keyframes pu{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.3;transform:scale(1.5)}}
.nav{background:var(--bg2);border-bottom:1px solid var(--bd);display:flex;overflow-x:auto;padding:0 6px;scrollbar-width:none}
.nav::-webkit-scrollbar{display:none}
.nav a{display:flex;flex-direction:column;align-items:center;padding:9px 11px;color:var(--t2);font-size:10px;font-weight:600;border-bottom:3px solid transparent;text-decoration:none;white-space:nowrap;gap:2px;min-width:58px;transition:all .15s}
.nav a:hover{color:var(--tx)}.nav a.cur{color:var(--tx);border-bottom-color:var(--bl)}
.nav a .ni{font-size:16px}
.wrap{max-width:1200px;margin:0 auto;padding:18px 13px}
.sgrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(100px,1fr));gap:9px;margin-bottom:18px}
.sc{background:var(--bg2);border:1px solid var(--bd);border-radius:var(--r);padding:13px;text-align:center;position:relative}
.sc::after{content:'';position:absolute;top:0;left:0;right:0;height:3px;border-radius:var(--r) var(--r) 0 0}
.sb::after{background:var(--bl)}.sy::after{background:var(--ye)}.sr::after{background:var(--rd)}
.sp::after{background:var(--pu)}.so::after{background:var(--or)}.sg::after{background:var(--gr)}
.sv{font-family:'Rajdhani',sans-serif;font-size:26px;font-weight:800}
.sb .sv{color:var(--bl)}.sy .sv{color:var(--ye)}.sr .sv{color:var(--rd)}
.sp .sv{color:var(--pu)}.so .sv{color:var(--or)}.sg .sv{color:var(--gr)}
.sl{font-size:9px;color:var(--t2);text-transform:uppercase;letter-spacing:.4px;margin-top:1px}
.fbar{display:flex;gap:7px;margin-bottom:13px;flex-wrap:wrap}
.fbar input{background:var(--bg3);border:1px solid var(--b2);border-radius:var(--rs);color:var(--tx);padding:8px 12px;font-size:12px;font-family:'Inter',sans-serif;outline:none;flex:1;min-width:150px}
.fbar input:focus{border-color:var(--bl)}
.fb{padding:7px 12px;border:1px solid var(--bd);border-radius:20px;background:transparent;color:var(--t2);font-size:10px;font-weight:600;cursor:pointer;transition:all .2s;text-transform:uppercase}
.fb.on,.fb:hover{border-color:var(--bl);color:var(--bl);background:rgba(0,212,255,.07)}
.tc{background:var(--bg2);border:1px solid var(--bd);border-radius:var(--r);overflow:hidden}
.th{padding:13px 16px;font-family:'Rajdhani',sans-serif;font-size:14px;font-weight:700;border-bottom:1px solid var(--bd);display:flex;justify-content:space-between;align-items:center}
.th small{font-size:11px;color:var(--t2);font-weight:400;font-family:'Inter',sans-serif}
.ts{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:11px}
th{text-align:left;font-size:9px;font-weight:600;color:var(--t3);text-transform:uppercase;padding:8px 12px;border-bottom:1px solid var(--bd);white-space:nowrap}
td{padding:10px 12px;border-bottom:1px solid var(--bd);vertical-align:top}
tr:last-child td{border-bottom:none}
tr:hover td{background:var(--bg3)}
.ptag{font-family:'Rajdhani',sans-serif;font-weight:700;font-size:14px;letter-spacing:1px;background:var(--bg4);border:1px solid var(--b2);border-radius:4px;padding:2px 8px;display:inline-block;color:var(--bl)}
.pi{display:inline-flex;align-items:center;gap:3px;padding:2px 8px;border-radius:20px;font-size:9px;font-weight:700;text-transform:uppercase;white-space:nowrap}
.pb{background:rgba(0,212,255,.12);color:var(--bl);border:1px solid rgba(0,212,255,.2)}
.py{background:rgba(255,208,0,.12);color:var(--ye);border:1px solid rgba(255,208,0,.2)}
.pr{background:rgba(255,68,102,.12);color:var(--rd);border:1px solid rgba(255,68,102,.2)}
.pp{background:rgba(167,139,250,.12);color:var(--pu);border:1px solid rgba(167,139,250,.2)}
.pg{background:rgba(0,232,150,.12);color:var(--gr);border:1px solid rgba(0,232,150,.2)}
.ec{font-size:11px;line-height:1.9;color:var(--t2)}
.ec .dn{color:var(--tx)}.ec .wt{color:var(--t3);font-style:italic}
.ec .dr{background:rgba(0,212,255,.1);color:var(--bl);border-radius:5px;padding:0 4px;font-size:10px;margin-left:3px}
.fl{color:var(--bl);font-size:10px;border:1px solid rgba(0,212,255,.3);border-radius:3px;padding:1px 5px;text-decoration:none}
.fl:hover{background:rgba(0,212,255,.1)}
.spin{width:26px;height:26px;border:3px solid var(--bd);border-top-color:var(--bl);border-radius:50%;animation:ro .7s linear infinite;margin:36px auto 8px}
@keyframes ro{to{transform:rotate(360deg)}}
.me{text-align:center;padding:40px;color:var(--t3)}
@media(max-width:600px){.sgrid{grid-template-columns:repeat(3,1fr)}}
</style>
</head>
<body>
<div class="top">
  <div class="logo">👁️ MASTER — RASTREIO EM TEMPO REAL</div>
  <div class="live"><div class="ldot"></div>AO VIVO</div>
</div>
<nav class="nav">
  <a href="master.html" class="cur"><span class="ni">👁️</span>Master</a>
  <a href="posto1.html"><span class="ni">🏁</span>Posto 1</a>
  <a href="triagem.html"><span class="ni">📦</span>Triagem</a>
  <a href="carregamento.html"><span class="ni">🏗️</span>Carga</a>
  <a href="enlonamento.html"><span class="ni">🪢</span>Enlone</a>
  <a href="faturamento.html"><span class="ni">🧾</span>Saída</a>
</nav>
<div class="wrap">
  <div class="sgrid">
    <div class="sc sb"><div class="sv" id="st-to">—</div><div class="sl">Total</div></div>
    <div class="sc sy"><div class="sv" id="st-tr">—</div><div class="sl">Triagem</div></div>
    <div class="sc sr"><div class="sv" id="st-ca">—</div><div class="sl">Carga</div></div>
    <div class="sc sp"><div class="sv" id="st-en">—</div><div class="sl">Enlone</div></div>
    <div class="sc so"><div class="sv" id="st-fa">—</div><div class="sl">Ag.Saída</div></div>
    <div class="sc sg"><div class="sv" id="st-ok">—</div><div class="sl">Concluído</div></div>
  </div>
  <div class="fbar">
    <input id="q" type="text" placeholder="🔍 Placa ou AC..." oninput="renderM()"/>
    <button class="fb on" onclick="setF('t',this)">Todos</button>
    <button class="fb" onclick="setF('a',this)">Em processo</button>
    <button class="fb" onclick="setF('c',this)">Concluídos</button>
  </div>
  <div class="tc">
    <div class="th">📋 Caminhões Hoje <small id="cnt"></small></div>
    <div id="ld"><div class="spin"></div></div>
    <div class="ts" id="tbl" style="display:none">
      <table>
        <thead><tr>
          <th>Placa</th><th>AC</th><th>Entrada</th><th>Setor</th>
          <th>📦 Triagem</th><th>🏗️ Carga</th><th>🪢 Enlone</th><th>🧾 Saída</th>
        </tr></thead>
        <tbody id="body"></tbody>
      </table>
    </div>
    <div class="me" id="emp" style="display:none">🔍 Nenhum resultado.</div>
  </div>
</div>
<script type="module">
import{initializeApp}from"https://www.gstatic.com/firebasejs/10.11.0/firebase-app.js";
import{getFirestore,collection,onSnapshot,query,orderBy}from"https://www.gstatic.com/firebasejs/10.11.0/firebase-firestore.js";
const app=initializeApp({apiKey:"AIzaSyCzd3mlF0qlPvw1AwVv3PAt9RXnZQ06sdY",
  authDomain:"cimento-d887e.firebaseapp.com",
  projectId:"cimento-d887e",
  storageBucket:"cimento-d887e.firebasestorage.app",
  messagingSenderId:"1098178518193",
  appId:"1:1098178518193:web:8712992a0eda7730ce9690"});
const db=getFirestore(app);
const hoje=()=>new Date().toISOString().split("T")[0];
const fmt=d=>d?d.toLocaleString("pt-BR",{day:"2-digit",month:"2-digit",hour:"2-digit",minute:"2-digit",second:"2-digit"}):"—";
const fmtT=d=>d?d.toLocaleTimeString("pt-BR",{hour:"2-digit",minute:"2-digit",second:"2-digit"}):"—";
function dur(ms){if(!ms||ms<0)return"";const m=Math.round(ms/60000);return m<60?m+"min":Math.floor(m/60)+"h"+m%60+"m";}
const SL={posto1:"Entrada",triagem_inicio:"Em Triagem",triagem_fim:"Triagem OK",carregamento_inicio:"Carregando",carregamento_fim:"Carregado",enlonamento_inicio:"Enlonando",enlonamento_fim:"Enlonado",concluido:"Concluído"};
function pill(s){
  if(!s||s==="posto1")return`<span class="pi pb">🔵 Entrada</span>`;
  if(s.startsWith("triagem"))return`<span class="pi py">🟡 ${SL[s]||s}</span>`;
  if(s.startsWith("carregamento"))return`<span class="pi pr">🔴 ${SL[s]||s}</span>`;
  if(s.startsWith("enlonamento"))return`<span class="pi pp">🟣 ${SL[s]||s}</span>`;
  if(s==="concluido")return`<span class="pi pg">🟢 Concluído</span>`;
  return`<span class="pi pb">${s}</span>`;
}
let HD=[],MF="t";
onSnapshot(query(collection(db,"caminhoes_rastreio"),orderBy("criadoEm","desc")),snap=>{
  HD=snap.docs.map(d=>{return{id:d.id,...d.data()}}).filter(c=>c.data===hoje());
  renderM();
  document.getElementById("ld").style.display="none";
  document.getElementById("tbl").style.display="block";
});
window.setF=(f,el)=>{MF=f;document.querySelectorAll(".fb").forEach(b=>b.classList.remove("on"));el.classList.add("on");renderM();};
window.renderM=()=>{
  document.getElementById("st-to").textContent=HD.length;
  document.getElementById("st-tr").textContent=HD.filter(c=>c.setorAtual?.startsWith("triagem")).length;
  document.getElementById("st-ca").textContent=HD.filter(c=>c.setorAtual?.startsWith("carregamento")).length;
  document.getElementById("st-en").textContent=HD.filter(c=>c.setorAtual?.startsWith("enlonamento")).length;
  document.getElementById("st-fa").textContent=HD.filter(c=>c.setorAtual==="enlonamento_fim").length;
  document.getElementById("st-ok").textContent=HD.filter(c=>c.setorAtual==="concluido").length;
  const q=(document.getElementById("q")?.value||"").toUpperCase();
  let list=[...HD];
  if(MF==="a")list=list.filter(c=>c.setorAtual!=="concluido");
  if(MF==="c")list=list.filter(c=>c.setorAtual==="concluido");
  if(q)list=list.filter(c=>c.placa?.includes(q)||c.ac?.includes(q));
  document.getElementById("cnt").textContent=list.length+" registro"+(list.length!==1?"s":"");
  const tb=document.getElementById("body"),em=document.getElementById("emp");
  if(!list.length){tb.innerHTML="";em.style.display="block";return;}
  em.style.display="none";
  tb.innerHTML=list.map(c=>{
    const en=c.entrada?.ts?.toDate?c.entrada.ts.toDate():null;
    const sa=c.faturamento?.ts?.toDate?c.faturamento.ts.toDate():null;
    return`<tr>
      <td><span class="ptag">${c.placa}</span></td>
      <td style="color:var(--t2)">${c.ac}</td>
      <td class="ec">${en?`<span class="dn">${fmtT(en)}</span>${c.entrada?.fotoPlaca?`<br><a class="fl" href="${c.entrada.fotoPlaca}" target="_blank">📷</a>`:""}`:"—"}</td>
      <td>${pill(c.setorAtual)}</td>
      <td>${eta(c,"triagem")}</td>
      <td>${eta(c,"carregamento")}</td>
      <td>${eta(c,"enlonamento")}</td>
      <td class="ec">${sa?`<span class="dn">${fmtT(sa)}</span>${c.faturamento?.fotoUrl?`<br><a class="fl" href="${c.faturamento.fotoUrl}" target="_blank">📷</a>`:""}`:`<span class="wt">aguardando</span>`}</td>
    </tr>`;
  }).join("");
};
function eta(c,sn){
  if(!c[sn])return`<span style="color:var(--t3);font-size:10px">—</span>`;
  const ini=c[sn].inicio?.toDate?c[sn].inicio.toDate():null;
  const fim=c[sn].fim?.toDate?c[sn].fim.toDate():null;
  const d=ini&&fim?`<span class="dr">${dur(fim-ini)}</span>`:"";
  return`<div class="ec"><span class="${ini?"dn":"wt"}">▶ ${ini?fmt(ini):"aguardando"}</span><br><span class="${fim?"dn":"wt"}">⏹ ${fim?fmt(fim):"aguardando"}</span>${d}</div>`;
}
</script></body></html>
