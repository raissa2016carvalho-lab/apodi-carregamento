<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Status do Pátio</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Rajdhani:wght@700;800&family=Inter:wght@400;500;600&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#060d18;--bg2:#0b1524;--bg3:#102030;--bg4:#152840;--bd:#162840;--b2:#1e3a58;--tx:#e2eeff;--t2:#7a9fd4;--t3:#3a5880;--bl:#00d4ff;--gr:#00e896;--ye:#ffd000;--rd:#ff4466;--pu:#a78bfa;--or:#fb923c;--r:12px;--rs:8px}
body{background:var(--bg);color:var(--tx);font-family:'Inter',sans-serif;min-height:100vh}
.top{background:var(--bg2);border-bottom:2px solid var(--bl);height:56px;display:flex;align-items:center;padding:0 20px;position:sticky;top:0;z-index:200;gap:12px}
.logo{font-family:'Rajdhani',sans-serif;font-size:18px;font-weight:800;color:var(--bl);flex:1;letter-spacing:1px}
.live{display:flex;align-items:center;gap:6px;font-size:12px;font-weight:600;color:var(--gr)}
.dot{width:8px;height:8px;background:var(--gr);border-radius:50%;animation:pu 1.4s ease-in-out infinite}
@keyframes pu{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.3;transform:scale(1.5)}}
.back-btn{padding:6px 14px;border:1px solid var(--b2);border-radius:20px;background:transparent;color:var(--t2);font-size:11px;font-weight:700;cursor:pointer;letter-spacing:.4px;text-decoration:none;display:inline-flex;align-items:center;gap:5px;transition:all .2s}
.back-btn:hover{border-color:var(--bl);color:var(--bl)}
.wrap{max-width:1200px;margin:0 auto;padding:20px 16px}
.kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px;margin-bottom:20px}
.kpi{background:var(--bg2);border:1px solid var(--bd);border-radius:var(--r);padding:14px;text-align:center;position:relative}
.kpi::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;border-radius:var(--r) var(--r) 0 0}
.k0::before{background:var(--bl)}.k1::before{background:var(--ye)}.k2::before{background:var(--rd)}.k3::before{background:var(--pu)}.k4::before{background:var(--gr)}
.kv{font-family:'Rajdhani',sans-serif;font-size:32px;font-weight:800}
.k0 .kv{color:var(--bl)}.k1 .kv{color:var(--ye)}.k2 .kv{color:var(--rd)}.k3 .kv{color:var(--pu)}.k4 .kv{color:var(--gr)}
.kl{font-size:9px;color:var(--t2);text-transform:uppercase;letter-spacing:.4px;margin-top:3px}
.section-title{font-family:'Rajdhani',sans-serif;font-size:16px;font-weight:700;color:var(--bl);letter-spacing:.5px;margin-bottom:12px;display:flex;align-items:center;gap:8px}
.section-title span{font-size:11px;font-weight:400;color:var(--t2);font-family:'Inter',sans-serif}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:10px;margin-bottom:24px}
.vcard{background:var(--bg2);border:1px solid var(--bd);border-radius:var(--r);padding:14px;border-left:3px solid var(--bl);transition:all .2s}
.vcard:hover{border-color:var(--bl);background:var(--bg3)}
.vcard.alerta{border-left-color:var(--rd);animation:cardAlert 1.2s ease-in-out infinite}
@keyframes cardAlert{0%,100%{background:rgba(255,68,102,.06)}50%{background:rgba(255,68,102,.14)}}
.vcard-placa{font-family:'Rajdhani',sans-serif;font-size:20px;font-weight:800;color:var(--bl);letter-spacing:1px;margin-bottom:4px}
.vcard.alerta .vcard-placa{color:var(--rd)}
.vcard-ac{font-size:11px;color:var(--t2);margin-bottom:6px}
.vcard-tipo{display:inline-block;font-size:9px;font-weight:800;padding:2px 8px;border-radius:4px;margin-bottom:8px}
.tp-ensacado{background:rgba(0,212,255,.12);color:#00d4ff;border:1px solid rgba(0,212,255,.25)}
.tp-granel{background:rgba(251,146,60,.12);color:#fb923c;border:1px solid rgba(251,146,60,.25)}
.tp-bigbag{background:rgba(0,232,150,.12);color:#00e896;border:1px solid rgba(0,232,150,.25)}
.vcard-tempo{font-family:'Rajdhani',sans-serif;font-size:18px;font-weight:800;color:var(--ye)}
.vcard.alerta .vcard-tempo{color:var(--rd)}
.vcard-tempo-label{font-size:9px;color:var(--t3);text-transform:uppercase;letter-spacing:.4px;margin-top:2px}
.vcard-entrada{font-size:10px;color:var(--t3);margin-top:6px}
.empty{text-align:center;padding:48px;color:var(--t3);font-size:13px;background:var(--bg2);border:1px solid var(--bd);border-radius:var(--r)}
.spin{width:28px;height:28px;border:3px solid var(--bd);border-top-color:var(--bl);border-radius:50%;animation:ro .7s linear infinite;margin:40px auto 10px}
@keyframes ro{to{transform:rotate(360deg)}}
.loading-wrap{text-align:center;padding:40px;color:var(--t3)}
.turno{display:inline-block;font-size:9px;font-weight:800;padding:1px 6px;border-radius:4px;margin-left:6px;vertical-align:middle;font-family:'Rajdhani',sans-serif}
.t-a{background:rgba(0,212,255,.15);color:var(--bl);border:1px solid rgba(0,212,255,.3)}
.t-b{background:rgba(255,208,0,.15);color:var(--ye);border:1px solid rgba(255,208,0,.3)}
.t-c{background:rgba(167,139,250,.15);color:var(--pu);border:1px solid rgba(167,139,250,.3)}
.alerta-badge{display:inline-block;background:rgba(255,68,102,.2);border:1px solid rgba(255,68,102,.4);color:#ff4466;font-size:9px;font-weight:800;padding:1px 6px;border-radius:4px;margin-left:5px;letter-spacing:.3px}
@media(max-width:600px){.grid{grid-template-columns:repeat(2,1fr)}}
</style>
</head>
<body>
<div class="top">
  <div class="logo">🏭 STATUS DO PÁTIO</div>
  <div class="live"><div class="dot"></div>AO VIVO</div>
  <a class="back-btn" href="/master">← Master</a>
</div>
<div class="wrap">
  <div id="loading-wrap" class="loading-wrap"><div class="spin"></div><div>Carregando...</div></div>
  <div id="content" style="display:none">
    <div class="kpis">
      <div class="kpi k0"><div class="kv" id="k-total">—</div><div class="kl">Total no Pátio</div></div>
      <div class="kpi k1"><div class="kv" id="k-aguard">—</div><div class="kl">Aguard. Triagem</div></div>
      <div class="kpi k2"><div class="kv" id="k-triagem">—</div><div class="kl">Em Triagem</div></div>
      <div class="kpi k3"><div class="kv" id="k-carga">—</div><div class="kl">Carregando</div></div>
      <div class="kpi k4"><div class="kv" id="k-enlone">—</div><div class="kl">Enlonando</div></div>
    </div>

    <!-- Aguardando Triagem -->
    <div id="sec-aguardando" style="display:none;margin-bottom:24px">
      <div class="section-title">🏁 Aguardando Triagem <span id="cnt-aguardando"></span></div>
      <div class="grid" id="grid-aguardando"></div>
    </div>

    <!-- Em Triagem -->
    <div id="sec-triagem" style="display:none;margin-bottom:24px">
      <div class="section-title">📦 Em Triagem <span id="cnt-triagem"></span></div>
      <div class="grid" id="grid-triagem"></div>
    </div>

    <!-- Carregamento -->
    <div id="sec-carga" style="display:none;margin-bottom:24px">
      <div class="section-title">🏗️ Carregamento <span id="cnt-carga"></span></div>
      <div class="grid" id="grid-carga"></div>
    </div>

    <!-- Enlonamento -->
    <div id="sec-enlone" style="display:none;margin-bottom:24px">
      <div class="section-title">🪢 Enlonamento <span id="cnt-enlone"></span></div>
      <div class="grid" id="grid-enlone"></div>
    </div>

    <!-- Ag. Faturamento -->
    <div id="sec-fat" style="display:none;margin-bottom:24px">
      <div class="section-title">🧾 Aguard. Faturamento <span id="cnt-fat"></span></div>
      <div class="grid" id="grid-fat"></div>
    </div>

    <div id="empty-all" class="empty" style="display:none">Nenhum veículo no pátio agora.</div>
  </div>
</div>

<script type="module">
import{initializeApp}from"https://www.gstatic.com/firebasejs/10.11.0/firebase-app.js";
import{getFirestore,collection,onSnapshot}from"https://www.gstatic.com/firebasejs/10.11.0/firebase-firestore.js";

const app=initializeApp({apiKey:"AIzaSyCMacFP0kGkgOTCqdWzf6Y65LN2q4tw28Y",authDomain:"cimento-6163b.firebaseapp.com",projectId:"cimento-6163b",storageBucket:"cimento-6163b.firebasestorage.app",messagingSenderId:"773785464621",appId:"1:773785464621:web:02dc9de04a7e2af231ada4"});
const db=getFirestore(app);

function hoje(){
  return new Date().toLocaleDateString("pt-BR",{timeZone:"America/Fortaleza"}).split("/").reverse().join("-");
}
function durStr(ms){
  if(!ms||ms<0)return"";
  const m=Math.round(ms/60000);
  return m<60?m+"min":Math.floor(m/60)+"h"+(m%60>0?" "+m%60+"m":"");
}
function fmtT(d){return d?d.toLocaleTimeString("pt-BR",{hour:"2-digit",minute:"2-digit"}):"—";}
function getTS(c,sn,f){const v=c[sn]?.[f];return v?.toDate?v.toDate():null;}
function getTurno(d){
  if(!d)return null;
  const h=d.getHours();
  if(h>=23||h<7)return"A";
  if(h>=7&&h<15)return"B";
  return"C";
}
function tipoCls(t){return{ensacado:"tp-ensacado",granel:"tp-granel",bigbag:"tp-bigbag"}[t]||"";}
const LIMITE_ALERTA=90*60*1000; // 1h30

function makeCard(c){
  const en=getTS(c,"entrada","ts");
  const espera=en?Date.now()-en.getTime():null;
  const alerta=espera&&espera>LIMITE_ALERTA;
  const turno=getTurno(en);
  const tipo=c.tipoCargaLabel||"";
  const tipoCl=tipoCls(c.tipoCarga);
  return`<div class="vcard${alerta?" alerta":""}">
    <div class="vcard-placa">${c.placa}${alerta?'<span class="alerta-badge">+1h30</span>':''}
      ${turno?`<span class="turno t-${turno.toLowerCase()}">${turno}</span>`:""}
    </div>
    <div class="vcard-ac">AC: ${c.ac}</div>
    ${tipo?`<span class="vcard-tipo ${tipoCl}">${tipo}</span>`:""}
    ${espera?`<div class="vcard-tempo">${durStr(espera)}</div><div class="vcard-tempo-label">no pátio</div>`:""}
    <div class="vcard-entrada">Entrada: ${fmtT(en)}</div>
  </div>`;
}

function showSection(id,gridId,cntId,list,label){
  const sec=document.getElementById(id);
  if(!list.length){sec.style.display="none";return;}
  sec.style.display="block";
  document.getElementById(cntId).textContent=`· ${list.length} veículo${list.length!==1?"s":""}`;
  document.getElementById(gridId).innerHTML=list.map(makeCard).join("");
}

onSnapshot(collection(db,"caminhoes_rastreio"),snap=>{
  const hj=hoje();
  const todos=snap.docs.map(d=>({id:d.id,...d.data()}))
    .filter(c=>c.data===hj&&c.setorAtual!=="concluido");

  document.getElementById("loading-wrap").style.display="none";
  document.getElementById("content").style.display="block";

  // KPIs
  document.getElementById("k-total").textContent=todos.length;
  document.getElementById("k-aguard").textContent=todos.filter(c=>c.setorAtual==="posto1").length;
  document.getElementById("k-triagem").textContent=todos.filter(c=>c.setorAtual?.startsWith("triagem")).length;
  document.getElementById("k-carga").textContent=todos.filter(c=>c.setorAtual?.startsWith("carregamento")).length;
  document.getElementById("k-enlone").textContent=todos.filter(c=>c.setorAtual?.startsWith("enlonamento")).length;

  // Seções
  const aguardando=todos.filter(c=>c.setorAtual==="posto1");
  const triagem=todos.filter(c=>c.setorAtual?.startsWith("triagem"));
  const carga=todos.filter(c=>c.setorAtual?.startsWith("carregamento"));
  const enlone=todos.filter(c=>c.setorAtual?.startsWith("enlonamento"));
  const fat=todos.filter(c=>c.setorAtual==="faturamento_aguardando");

  showSection("sec-aguardando","grid-aguardando","cnt-aguardando",aguardando);
  showSection("sec-triagem","grid-triagem","cnt-triagem",triagem);
  showSection("sec-carga","grid-carga","cnt-carga",carga);
  showSection("sec-enlone","grid-enlone","cnt-enlone",enlone);
  showSection("sec-fat","grid-fat","cnt-fat",fat);

  const emptyAll=document.getElementById("empty-all");
  emptyAll.style.display=todos.length===0?"block":"none";
});

// Atualiza tempo a cada minuto
setInterval(()=>{
  document.querySelectorAll(".vcard-tempo").forEach(el=>{
    // re-render triggered by onSnapshot on next tick
  });
  // Force re-render via fake update
  const ev=new Event("visibilitychange");
  document.dispatchEvent(ev);
},60000);
</script>
</body></html>
