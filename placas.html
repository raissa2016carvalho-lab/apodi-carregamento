<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Análise de Placas</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Rajdhani:wght@700;800&family=Inter:wght@400;500;600&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#060d18;--bg2:#0b1524;--bg3:#102030;--bg4:#152840;--bd:#162840;--b2:#1e3a58;--tx:#e2eeff;--t2:#7a9fd4;--t3:#3a5880;--bl:#00d4ff;--gr:#00e896;--ye:#ffd000;--rd:#ff4466;--pu:#a78bfa;--or:#fb923c;--tm:#ff9f43;--r:12px;--rs:8px}
body{background:var(--bg);color:var(--tx);font-family:'Inter',sans-serif;min-height:100vh}
.top{background:var(--bg2);border-bottom:2px solid var(--pu);height:56px;display:flex;align-items:center;padding:0 20px;position:sticky;top:0;z-index:200;gap:12px}
.logo{font-family:'Rajdhani',sans-serif;font-size:18px;font-weight:800;color:var(--pu);flex:1;letter-spacing:1px}
.back-btn{padding:6px 14px;border:1px solid var(--b2);border-radius:20px;background:transparent;color:var(--t2);font-size:11px;font-weight:700;text-decoration:none;transition:all .2s}
.back-btn:hover{border-color:var(--bl);color:var(--bl)}
.wrap{max-width:1600px;margin:0 auto;padding:20px 16px}
.kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:10px;margin-bottom:20px}
.kpi{background:var(--bg2);border:1px solid var(--bd);border-radius:var(--r);padding:14px;text-align:center}
.kv{font-family:'Rajdhani',sans-serif;font-size:26px;font-weight:800;color:var(--pu)}
.kl{font-size:9px;color:var(--t2);text-transform:uppercase;letter-spacing:.4px;margin-top:2px}
.filter-row{display:flex;gap:6px;margin-bottom:8px;flex-wrap:wrap;align-items:center}
.row-label{font-size:10px;color:var(--t3);font-weight:600;padding:0 4px;white-space:nowrap;min-width:60px}
.pb{padding:6px 14px;border:1px solid var(--bd);border-radius:20px;background:transparent;color:var(--t2);font-size:10px;font-weight:700;cursor:pointer;transition:all .2s;text-transform:uppercase;white-space:nowrap;letter-spacing:.4px}
.pb.on{border-color:var(--ye);color:var(--ye);background:rgba(255,208,0,.08)}
.ttb{padding:6px 0;border:1px solid var(--bd);border-radius:20px;background:transparent;color:var(--t2);font-size:10px;font-weight:700;cursor:pointer;transition:all .2s;white-space:nowrap;min-width:110px;text-align:center}
.ttb.on-all{border-color:var(--bl);color:var(--bl);background:rgba(0,212,255,.07)}
.ttb.on-ens{border-color:#00d4ff;color:#00d4ff;background:rgba(0,212,255,.10)}
.ttb.on-gr{border-color:#fb923c;color:#fb923c;background:rgba(251,146,60,.10)}
.ttb.on-bb{border-color:#00e896;color:#00e896;background:rgba(0,232,150,.10)}
.etb{padding:6px 14px;border:1px solid var(--bd);border-radius:20px;background:transparent;color:var(--t2);font-size:10px;font-weight:700;cursor:pointer;transition:all .2s;white-space:nowrap}
.etb.on{border-color:var(--tm);color:var(--tm);background:rgba(255,159,67,.08)}
.spin{width:28px;height:28px;border:3px solid var(--bd);border-top-color:var(--pu);border-radius:50%;animation:ro .7s linear infinite;margin:60px auto 10px}
@keyframes ro{to{transform:rotate(360deg)}}
.loading-wrap{text-align:center;padding:40px;color:var(--t3)}
.tcard{background:var(--bg2);border:1px solid var(--bd);border-radius:var(--r);overflow:hidden;margin-bottom:16px}
.tscroll{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:11px}
th{text-align:center;font-size:9px;font-weight:600;color:var(--t3);text-transform:uppercase;padding:9px 10px;border-bottom:1px solid var(--bd);white-space:nowrap;background:var(--bg3);cursor:pointer;user-select:none;transition:color .15s}
th:hover{color:var(--t2)}
th.sort-asc::after{content:" ▲";font-size:8px;color:var(--pu)}
th.sort-desc::after{content:" ▼";font-size:8px;color:var(--pu)}
th.sort-asc,th.sort-desc{color:var(--pu)}
th.placa-th{text-align:left;min-width:120px;position:sticky;left:0;z-index:10;background:var(--bg3)}
th.visit-th{min-width:60px;color:var(--t3)}
td{padding:8px 10px;border-bottom:1px solid var(--bd);text-align:center;vertical-align:middle;white-space:nowrap}
td.placa-td{text-align:left;font-family:'Rajdhani',sans-serif;font-size:14px;font-weight:700;color:var(--bl);letter-spacing:1px;background:var(--bg2);position:sticky;left:0;z-index:9;border-right:1px solid var(--bd)}
td.visit-td{font-size:10px;color:var(--t3);font-style:italic}
td.placa-td.cont{color:var(--t3);font-size:11px;font-weight:400;font-family:'Inter',sans-serif;letter-spacing:0}
tr:hover td{background:var(--bg3)}
tr:hover td.placa-td{background:var(--bg3)}
tr.first-row td{border-top:1px solid var(--b2)}
tr.first-row td.placa-td{color:var(--bl);font-size:14px;font-family:'Rajdhani',sans-serif;font-weight:700;letter-spacing:1px}
.pill-ok{display:inline-block;padding:2px 8px;border-radius:20px;font-size:10px;font-weight:700;background:rgba(0,232,150,.12);color:#00e896;border:1px solid rgba(0,232,150,.25);font-family:'Rajdhani',sans-serif}
.pill-warn{display:inline-block;padding:2px 8px;border-radius:20px;font-size:10px;font-weight:700;background:rgba(255,208,0,.12);color:#ffd000;border:1px solid rgba(255,208,0,.25);font-family:'Rajdhani',sans-serif}
.pill-danger{display:inline-block;padding:2px 8px;border-radius:20px;font-size:10px;font-weight:700;background:rgba(255,68,102,.12);color:#ff4466;border:1px solid rgba(255,68,102,.25);font-family:'Rajdhani',sans-serif}
.pill-media{display:inline-block;padding:2px 8px;border-radius:20px;font-size:10px;font-weight:700;background:rgba(167,139,250,.12);color:#a78bfa;border:1px solid rgba(167,139,250,.25);font-family:'Rajdhani',sans-serif}
.empty{color:var(--t3);font-size:14px}
.legend{display:flex;gap:16px;flex-wrap:wrap;padding:12px 16px;border-top:1px solid var(--bd);background:var(--bg3)}
.leg{display:flex;align-items:center;gap:6px;font-size:10px;color:var(--t2)}
.leg-dot{width:8px;height:8px;border-radius:50%}
.empty-state{text-align:center;padding:48px;color:var(--t3);font-size:13px}
.tw{position:relative;display:inline-block}
.tw .tt{visibility:hidden;opacity:0;position:absolute;bottom:calc(100% + 8px);left:50%;transform:translateX(-50%);background:var(--bg4);border:1px solid var(--b2);border-radius:var(--rs);padding:10px 13px;font-size:11px;color:var(--tx);z-index:999;transition:opacity .15s;pointer-events:none;min-width:180px;max-width:280px;white-space:normal;text-align:left;line-height:1.6;box-shadow:0 4px 20px rgba(0,0,0,.4)}
.tw .tt::after{content:'';position:absolute;top:100%;left:50%;transform:translateX(-50%);border:5px solid transparent;border-top-color:var(--b2)}
.tw:hover .tt{visibility:visible;opacity:1}
</style>
</head>

  <a href="/patio" style="padding:6px 14px;border:1px solid rgba(0,232,150,.4);border-radius:20px;background:rgba(0,232,150,.07);color:var(--gr);font-size:11px;font-weight:700;text-decoration:none;white-space:nowrap;transition:all .2s" onmouseover="this.style.background='rgba(0,232,150,.15)'" onmouseout="this.style.background='rgba(0,232,150,.07)'">🏭 Pátio</a>

</div>

function periodDates(p){
  const now=new Date();
  const tz=new Date(now.toLocaleString("en-US",{timeZone:"America/Fortaleza"}));
  const pad=n=>String(n).padStart(2,"0");
  const fmt=d=>`${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
  if(p==="semana"){const d=new Date(tz);d.setDate(tz.getDate()-6);return{s:fmt(d),e:fmt(tz)};}
  if(p==="mes"){const s=new Date(tz.getFullYear(),tz.getMonth(),1);return{s:fmt(s),e:fmt(tz)};}
  if(p==="ano"){const s=new Date(tz.getFullYear(),0,1);return{s:fmt(s),e:fmt(tz)};}
  return{s:fmt(tz),e:fmt(tz)};
}
function getTS(c,sn,f){const v=c[sn]?.[f];return v?.toDate?v.toDate():null;}
function calcTMAC(c){const en=getTS(c,"entrada","ts"),sa=getTS(c,"faturamento","ts");return(en&&sa)?sa-en:null;}
function getEtapaMs(c,etapa){
  if(etapa==="tmac")return calcTMAC(c);
  if(etapa==="espera"){const en=getTS(c,"entrada","ts"),trI=getTS(c,"triagem","inicio");return(en&&trI)?trI-en:null;}
  if(etapa==="triagem"){const i=getTS(c,"triagem","inicio"),f=getTS(c,"triagem","fim");return(i&&f)?f-i:null;}
  if(etapa==="carregamento"){const i=getTS(c,"carregamento","inicio"),f=getTS(c,"carregamento","fim");return(i&&f)?f-i:null;}
  if(etapa==="enlonamento"){const i=getTS(c,"enlonamento","inicio"),f=getTS(c,"enlonamento","fim");return(i&&f)?f-i:null;}
  if(etapa==="faturamento"){const enF=getTS(c,"enlonamento","fim"),sa=getTS(c,"faturamento","ts");return(enF&&sa)?sa-enF:null;}
  return null;
}
function durStr(ms){
  if(!ms||ms<0)return"—";
  const m=Math.round(ms/60000);
  return m<60?m+"min":Math.floor(m/60)+"h"+(m%60>0?" "+m%60+"m":"");
}
function fmtDay(d){const[y,mo,dd]=d.split("-");return dd+"/"+mo;}
function fmtT(d){return d?d.toLocaleTimeString("pt-BR",{hour:"2-digit",minute:"2-digit"}):"—";}
function getDays(s,e){
  const days=[];let cur=new Date(s+"T00:00:00");const end=new Date(e+"T00:00:00");
  while(cur<=end){const pad=n=>String(n).padStart(2,"0");days.push(`${cur.getFullYear()}-${pad(cur.getMonth()+1)}-${pad(cur.getDate())}`);cur.setDate(cur.getDate()+1);}
  return days;
}
function pillClass(ms){
  if(!ms)return"";
  if(ms>LIMITE)return"pill-danger";
  if(ms>ATENCAO)return"pill-warn";
  return"pill-ok";
}

let ALL=[],MP="semana",MT="t",ME="tmac",SORT_COL=null,SORT_DIR=1;

onSnapshot(collection(db,"caminhoes_rastreio"),snap=>{
  ALL=snap.docs.map(d=>{return{id:d.id,...d.data()}});
  document.getElementById("loading-wrap").style.display="none";
  document.getElementById("tcard").style.display="block";
  render();
});

window.setPeriod=(p,el)=>{MP=p;document.querySelectorAll(".pb").forEach(b=>b.classList.remove("on"));el.classList.add("on");render();};
window.setTipo=(t,el)=>{
  MT=t;document.querySelectorAll(".ttb").forEach(b=>b.className="ttb");
  const cls={t:"on-all",ensacado:"on-ens",granel:"on-gr",bigbag:"on-bb"}[t];
  el.classList.add(cls);render();
};
window.setEtapa=(e,el)=>{ME=e;document.querySelectorAll(".etb").forEach(b=>b.classList.remove("on"));el.classList.add("on");render();};

function setSort(col){
  if(SORT_COL===col)SORT_DIR*=-1;
  else{SORT_COL=col;SORT_DIR=1;}
  render();
}

function render(){
  const{s,e}=periodDates(MP);
  const days=getDays(s,e);
  let list=ALL.filter(c=>c.data>=s&&c.data<=e&&c.setorAtual==="concluido");
  if(MT!=="t")list=list.filter(c=>c.tipoCarga===MT);

  // Group by placa → day → [registros]
  const placaMap={};
  list.forEach(c=>{
    if(!placaMap[c.placa])placaMap[c.placa]={};
    if(!placaMap[c.placa][c.data])placaMap[c.placa][c.data]=[];
    placaMap[c.placa][c.data].push(c);
  });

  // Calcular média geral por placa para ordenação
  const placaAvg={};
  Object.keys(placaMap).forEach(placa=>{
    const vals=[];
    Object.values(placaMap[placa]).forEach(visits=>{
      visits.forEach(c=>{const ms=getEtapaMs(c,ME);if(ms)vals.push(ms);});
    });
    placaAvg[placa]=vals.length?vals.reduce((a,b)=>a+b,0)/vals.length:0;
  });

  let placas=Object.keys(placaMap);

  // Sort
  if(SORT_COL==="placa"){
    placas.sort((a,b)=>SORT_DIR*(a>b?1:a<b?-1:0));
  } else if(SORT_COL==="media"){
    placas.sort((a,b)=>SORT_DIR*(placaAvg[a]-placaAvg[b]));
  } else if(SORT_COL&&SORT_COL.startsWith("day_")){
    const day=SORT_COL.replace("day_","");
    placas.sort((a,b)=>{
      const va=placaMap[a][day]?placaMap[a][day].map(c=>getEtapaMs(c,ME)||0).reduce((x,y)=>x+y,0)/placaMap[a][day].length:0;
      const vb=placaMap[b][day]?placaMap[b][day].map(c=>getEtapaMs(c,ME)||0).reduce((x,y)=>x+y,0)/placaMap[b][day].length:0;
      return SORT_DIR*(va-vb);
    });
  } else {
    placas.sort();
  }

  // KPIs
  const allMs=list.map(c=>getEtapaMs(c,ME)).filter(v=>v);
  const avgGeral=allMs.length?allMs.reduce((a,b)=>a+b,0)/allMs.length:null;
  const acima=list.filter(c=>calcTMAC(c)>LIMITE).length;
  document.getElementById("k0").textContent=placas.length||"—";
  document.getElementById("k1").textContent=days.length;
  document.getElementById("k2").textContent=avgGeral?durStr(avgGeral):"—";
  document.getElementById("k3").textContent=list.length||"—";
  document.getElementById("k4").textContent=acima;

  if(!placas.length){document.getElementById("tscroll").innerHTML=`<div class="empty-state">Nenhum registro concluído no período.</div>`;return;}

  // Update sort headers helper
  const sortIcon=(col)=>SORT_COL===col?(SORT_DIR===1?" ▲":" ▼"):"";

  let html=`<table><thead><tr>`;
  html+=`<th class="placa-th" onclick="setSort('placa')" style="cursor:pointer">Placa${sortIcon('placa')}</th>`;
  html+=`<th class="visit-th">Visita</th>`;
  html+=`<th onclick="setSort('entrada')" style="cursor:pointer">Entrada${sortIcon('entrada')}</th>`;
  days.forEach(d=>html+=`<th onclick="setSort('day_${d}')" style="cursor:pointer">${fmtDay(d)}${sortIcon('day_'+d)}</th>`);
  html+=`<th onclick="setSort('media')" style="cursor:pointer;color:var(--pu)">Média${sortIcon('media')}</th>`;
  html+=`</tr></thead><tbody>`;

  placas.forEach(placa=>{
    const dayData=placaMap[placa];
    // Calcular max visitas para essa placa
    const maxVisits=Math.max(...Object.values(dayData).map(v=>v.length));
    const allVals=[];

    for(let vi=0;vi<maxVisits;vi++){
      const isFirst=vi===0;
      html+=`<tr class="${isFirst?'first-row':''}">`;

      // Célula de placa — só na primeira linha
      if(isFirst){
        html+=`<td class="placa-td" rowspan="${maxVisits}">${placa}</td>`;
      }

      // Número da visita
      html+=`<td class="visit-td">#${vi+1}</td>`;

      // Entrada da visita (pegar do primeiro dia que tem essa visita)
      let entradaStr="—";
      const firstDayWithVisit=days.find(d=>dayData[d]&&dayData[d][vi]);
      if(firstDayWithVisit&&dayData[firstDayWithVisit][vi]){
        const en=getTS(dayData[firstDayWithVisit][vi],"entrada","ts");
        entradaStr=en?fmtT(en):"—";
      }
      html+=`<td style="font-size:10px;color:var(--t2)">${entradaStr}</td>`;

      // Células por dia
      days.forEach(day=>{
        const visits=dayData[day];
        if(!visits||!visits[vi]){html+=`<td><span class="empty">·</span></td>`;return;}
        const c=visits[vi];
        const ms=getEtapaMs(c,ME);
        if(!ms){html+=`<td><span class="empty">·</span></td>`;return;}
        allVals.push(ms);
        const cls=pillClass(ms);
        const en=getTS(c,"entrada","ts");
        const just=c.justificativa;
        const hasJust=!!(just&&just.motivo);
        if(cls==='pill-danger'||cls==='pill-warn'){
          let justHtml='';
          if(hasJust){
            justHtml='<div style="color:var(--gr);font-weight:700;font-size:11px">✅ '+just.motivo+'</div>';
            if(just.descricao)justHtml+='<div style="color:var(--t2);font-size:10px;margin-top:2px">"'+just.descricao+'"</div>';
          }else{
            justHtml='<div style="color:var(--t3);font-size:10px;font-style:italic">Sem justificativa registrada</div>';
          }
          const ttHtml='<div style="font-size:10px;color:var(--t3);margin-bottom:3px">Entrada: '+fmtT(en)+'</div>'
            +'<div style="font-size:10px;color:var(--t3);margin-bottom:6px">TMAC: '+durStr(calcTMAC(c))+'</div>'
            +'<div style="border-top:1px solid var(--bd);padding-top:6px">'+justHtml+'</div>';
          html+=`<td><div class="tw"><span class="${cls}">${durStr(ms)}</span><div class="tt">`+ttHtml+`</div></div></td>`;
        }else{
          html+=`<td><span class="${cls}">${durStr(ms)}</span></td>`;
        }
      });

      // Média só na primeira linha
      if(isFirst){
        const allPlacaVals=[];
        Object.values(dayData).forEach(visits=>visits.forEach(c=>{const ms=getEtapaMs(c,ME);if(ms)allPlacaVals.push(ms);}));
        const avg=allPlacaVals.length?allPlacaVals.reduce((a,b)=>a+b,0)/allPlacaVals.length:null;
        html+=`<td rowspan="${maxVisits}">${avg?`<span class="pill-media">${durStr(avg)}</span>`:'<span class="empty">·</span>'}</td>`;
      }

      html+=`</tr>`;
    }
  });

  html+=`</tbody></table>`;
  document.getElementById("tscroll").innerHTML=html;
}
</script>
</body></html>
