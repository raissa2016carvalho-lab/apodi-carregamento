<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<title>Posto 1 — Entrada</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
:root{--navy:#0a1628;--navy2:#0d1f3c;--teal:#00b4b0;--teal2:#009994;--white:#ffffff;--gray:#e8eaed;--gray2:#c5cad4;--gray3:#8892a0;--text:#1a2332;--text2:#4a5568;--bg:#f0f2f5;--r:8px;--rs:6px}
body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;min-height:100vh;display:flex;flex-direction:column}
.header{background:var(--navy);padding:0 20px;height:58px;display:flex;align-items:center;justify-content:space-between;border-bottom:3px solid var(--teal);flex-shrink:0}
.h-left{display:flex;align-items:center;gap:12px}
.h-icon{width:36px;height:36px;background:var(--teal);border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.h-title{color:var(--white);font-size:15px;font-weight:700}
.h-sub{color:var(--gray2);font-size:11px;margin-top:1px}
.live{display:flex;align-items:center;gap:5px;color:var(--teal);font-size:11px;font-weight:600}
.ldot{width:6px;height:6px;background:var(--teal);border-radius:50%;animation:pu 1.5s ease-in-out infinite}
@keyframes pu{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.3;transform:scale(1.5)}}
.content{flex:1;display:flex;align-items:center;justify-content:center;padding:24px 16px}
.box{width:100%;max-width:480px}
.card{background:var(--white);border:1px solid var(--gray);border-radius:var(--r);padding:24px;box-shadow:0 2px 8px rgba(0,0,0,.08)}
.card-title{font-size:16px;font-weight:700;color:var(--navy);margin-bottom:20px;display:flex;align-items:center;gap:8px;padding-bottom:14px;border-bottom:2px solid var(--gray)}
.fg{display:flex;flex-direction:column;gap:5px;margin-bottom:14px}
.fg label{font-size:11px;font-weight:600;color:var(--gray3);text-transform:uppercase;letter-spacing:.5px}
.fg input{background:var(--white);border:1.5px solid var(--gray2);border-radius:var(--rs);color:var(--text);padding:11px 13px;font-size:14px;font-family:'Inter',sans-serif;outline:none;transition:border-color .2s;width:100%}
.fg input:focus{border-color:var(--teal)}
.cam{width:100%;background:var(--bg);border:2px dashed var(--gray2);border-radius:var(--r);min-height:160px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:7px;cursor:pointer;transition:all .2s;position:relative;overflow:hidden;margin-bottom:10px}
.cam:hover{border-color:var(--teal)}
.cam.analyzing{border-color:#f59e0b;border-style:solid;animation:bl .9s ease-in-out infinite}
.cam.success{border-color:#22c55e;border-style:solid}
.cam.fail{border-color:#ef4444;border-style:solid}
@keyframes bl{0%,100%{opacity:1}50%{opacity:.6}}
.cam input[type=file]{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%}
.ci{font-size:36px;pointer-events:none}
.cl{font-size:13px;color:var(--gray3);pointer-events:none;font-weight:500;text-align:center}
.cs{font-size:11px;color:var(--gray2);pointer-events:none}
.prev{width:100%;max-height:180px;object-fit:cover;display:none}
.cam.analyzing .ci,.cam.analyzing .cl,.cam.analyzing .cs,.cam.success .ci,.cam.success .cl,.cam.success .cs,.cam.fail .ci,.cam.fail .cl,.cam.fail .cs{display:none}
.cam.analyzing .prev,.cam.success .prev,.cam.fail .prev{display:block}
.tsbar{position:absolute;bottom:0;left:0;right:0;background:rgba(10,22,40,.9);padding:6px 10px;font-size:11px;font-weight:600;color:#fff;display:none;line-height:1.5}
.cam.analyzing .tsbar,.cam.success .tsbar,.cam.fail .tsbar{display:block}
.ov{position:absolute;inset:0;display:none;flex-direction:column;align-items:center;justify-content:center;gap:8px;background:rgba(0,0,0,.5)}
.cam.analyzing .ov{display:flex}
.sp{width:32px;height:32px;border:3px solid rgba(245,158,11,.3);border-top-color:#f59e0b;border-radius:50%;animation:ro .7s linear infinite}
@keyframes ro{to{transform:rotate(360deg)}}
.sptxt{font-size:12px;color:#fbbf24;font-weight:600;text-align:center}
.confirm-box{background:#f0fdf4;border:1.5px solid #22c55e;border-radius:var(--r);padding:14px;margin-bottom:12px;display:none}
.cb-label{font-size:10px;font-weight:600;color:var(--gray3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px}
.cb-placa{font-size:32px;font-weight:900;letter-spacing:4px;font-family:'Courier New',monospace;text-align:center;padding:8px;background:var(--white);border-radius:var(--rs);border:1.5px solid var(--gray2);width:100%;color:var(--navy);outline:none;text-transform:uppercase;margin-bottom:8px;transition:border-color .2s}
.cb-placa:focus{border-color:var(--teal)}
.cb-info{font-size:12px;color:var(--text2);text-align:center;line-height:1.7;margin-bottom:3px}
.cb-hint{font-size:11px;color:var(--gray3);text-align:center}
.err-box{background:#fef2f2;border:1px solid #fecaca;border-radius:var(--rs);padding:10px 13px;margin-bottom:10px;font-size:12px;color:#991b1b;line-height:1.6;display:none}
.btn{width:100%;padding:13px;border:none;border-radius:var(--rs);font-size:14px;font-weight:600;cursor:pointer;letter-spacing:.3px;transition:all .2s;margin-bottom:8px;font-family:'Inter',sans-serif}
.btn:disabled{opacity:.35;cursor:not-allowed}
.btn:not(:disabled):hover{transform:translateY(-1px);box-shadow:0 4px 12px rgba(0,0,0,.15)}
.btn-teal{background:var(--teal);color:var(--white)}
.btn-navy{background:var(--navy);color:var(--white)}
.btn-green{background:#16a34a;color:var(--white)}
.btn-outline{background:transparent;border:1.5px solid var(--gray2);color:var(--text2)}
.btn-outline:hover{border-color:var(--teal);color:var(--teal)}
.msg{padding:11px 14px;border-radius:var(--rs);font-size:13px;margin-bottom:12px;display:none;font-weight:500}
.msg.on{display:block}
.ok{background:#f0fdf4;border:1px solid #86efac;color:#166534}
.er{background:#fef2f2;border:1px solid #fca5a5;color:#991b1b}
.wn{background:#fffbeb;border:1px solid #fde68a;color:#92400e}
.section-box{background:var(--white);border:1.5px solid var(--gray);border-radius:var(--r);padding:16px;margin-bottom:12px}
.section-box.ini-box{border-left:4px solid #f59e0b}
.section-box.fim-box{border-left:4px solid #22c55e}
.section-label{font-size:10px;font-weight:700;color:var(--gray3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:10px;display:flex;align-items:center;gap:6px}
</style>
</head>
<body>
<div id="login-screen" style="position:fixed;inset:0;background:#0a1628;display:flex;align-items:center;justify-content:center;z-index:9999;padding:20px">
  <div style="background:#0d1f3c;border:1px solid #1e3a58;border-radius:12px;padding:32px 28px;width:100%;max-width:340px;text-align:center">
    <div style="font-size:44px;margin-bottom:10px">🏁</div>
    <div style="font-family:sans-serif;font-size:18px;font-weight:800;color:#00b4b0;margin-bottom:4px">Posto 1 — Entrada</div>
    <div style="font-size:12px;color:#c5cad4;margin-bottom:22px">Acesso restrito</div>
    <div id="login-err" style="background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.3);color:#ef4444;border-radius:8px;padding:10px;font-size:12px;margin-bottom:12px;display:none">Usuário ou senha incorretos</div>
    <div style="display:flex;flex-direction:column;gap:5px;margin-bottom:12px;text-align:left">
      <label style="font-size:10px;font-weight:600;color:#8892a0;text-transform:uppercase;letter-spacing:.5px">Usuário</label>
      <input id="l-user" type="text" autocomplete="off" onkeydown="if(event.key==='Enter')doLogin()" style="background:#1a2332;border:1.5px solid #1e3a58;border-radius:6px;color:#e2eeff;padding:11px 13px;font-size:14px;font-family:inherit;outline:none;width:100%;box-sizing:border-box"/>
    </div>
    <div style="display:flex;flex-direction:column;gap:5px;margin-bottom:16px;text-align:left">
      <label style="font-size:10px;font-weight:600;color:#8892a0;text-transform:uppercase;letter-spacing:.5px">Senha</label>
      <input id="l-pass" type="password" onkeydown="if(event.key==='Enter')doLogin()" style="background:#1a2332;border:1.5px solid #1e3a58;border-radius:6px;color:#e2eeff;padding:11px 13px;font-size:14px;font-family:inherit;outline:none;width:100%;box-sizing:border-box"/>
    </div>
    <button onclick="doLogin()" style="width:100%;padding:13px;border:none;border-radius:8px;background:#00b4b0;color:#000;font-size:14px;font-weight:700;cursor:pointer">Entrar</button>
  </div>
</div>
<div class="header">
  <div class="h-left">
    <div class="h-icon">🏁</div>
    <div><div class="h-title">Posto 1 — Entrada</div><div class="h-sub">Registrar chegada do caminhão</div></div>
  </div>
  <div class="live"><div class="ldot"></div>AO VIVO</div>
</div>
<div class="content">
  <div class="box">
    <div class="card">
      <div class="card-title">🏁 Registrar Chegada</div>
      <div id="msg" class="msg"></div>
      <div class="fg">
        <label>Número da AC</label>
        <input id="ac" type="text" placeholder="Ex: AC-2024-001" autocomplete="off" oninput="chk()" style="text-transform:uppercase"/>
      </div>
      <div class="fg">
        <label>Placa do Caminhão</label>
        <input id="pl" type="text" placeholder="ABC1234" maxlength="8" autocomplete="off" oninput="chk()" style="text-transform:uppercase;letter-spacing:3px;font-weight:700;font-family:'Courier New',monospace;font-size:18px;text-align:center"/>
      </div>
      <button class="btn btn-teal" id="go" onclick="registrar()" disabled style="margin-top:8px">✅ Registrar Entrada</button>
    </div>
  </div>
</div>
<script type="module">
import{initializeApp}from"https://www.gstatic.com/firebasejs/10.11.0/firebase-app.js";
import{getFirestore,collection,addDoc,onSnapshot,Timestamp}from"https://www.gstatic.com/firebasejs/10.11.0/firebase-firestore.js";
const app=initializeApp({apiKey:"AIzaSyCMacFP0kGkgOTCqdWzf6Y65LN2q4tw28Y",authDomain:"cimento-6163b.firebaseapp.com",projectId:"cimento-6163b",storageBucket:"cimento-6163b.firebasestorage.app",messagingSenderId:"773785464621",appId:"1:773785464621:web:02dc9de04a7e2af231ada4"});
const db=getFirestore(app);

const _AU="master",_AP="master2026",_SK="posto1";
window.doLogin=async()=>{
  const u=document.getElementById("l-user").value.trim().toLowerCase();
  const p=document.getElementById("l-pass").value.trim();
  document.getElementById("login-err").style.display="none";
  if(u===_AU&&p===_AP){document.getElementById("login-screen").style.display="none";return;}
  try{
    const {collection:_col,getDocs,query:_q,where}=await import("https://www.gstatic.com/firebasejs/10.11.0/firebase-firestore.js");
    const snap=await getDocs(_q(_col(db,"usuarios"),where("usuario","==",u),where("senha","==",p),where("setor","==",_SK)));
    if(!snap.empty){document.getElementById("login-screen").style.display="none";return;}
  }catch(e){console.error(e);}
  document.getElementById("login-err").style.display="block";
};

const hoje=()=>new Date().toLocaleDateString("pt-BR",{timeZone:"America/Fortaleza"}).split("/").reverse().join("-");
const fmtT=d=>d?d.toLocaleTimeString("pt-BR",{hour:"2-digit",minute:"2-digit",second:"2-digit"}):"—";
let HD=[];
onSnapshot(collection(db,"caminhoes_rastreio"),snap=>{
  HD=snap.docs.map(d=>{return{id:d.id,...d.data()}}).filter(c=>c.data===hoje());
});
window.chk=()=>{
  const ac=document.getElementById("ac").value.trim();
  const pl=document.getElementById("pl").value.replace(/[^A-Z0-9]/gi,"");
  document.getElementById("go").disabled=!(ac.length>=2&&pl.length>=7);
};
window.registrar=async()=>{
  const ac=document.getElementById("ac").value.trim().toUpperCase();
  const pl=document.getElementById("pl").value.toUpperCase().replace(/[^A-Z0-9]/g,"");
  if(!ac||pl.length<7){showMsg("er","Preencha a AC e a placa.");return;}
  if(HD.find(c=>c.placa===pl&&c.setorAtual!=="concluido")){showMsg("er","Placa "+pl+" já possui AC em processo! Conclua antes de registrar nova entrada.");return;}
  document.getElementById("go").disabled=true;
  try{
    const ts=new Date();
    await addDoc(collection(db,"caminhoes_rastreio"),{
      ac,placa:pl,setorAtual:"posto1",
      entrada:{ts:Timestamp.fromDate(ts)},
      triagem:null,carregamento:null,enlonamento:null,faturamento:null,
      data:hoje(),criadoEm:Timestamp.fromDate(ts)
    });
    showMsg("ok","✅ "+pl+" registrado! AC: "+ac+" · "+fmtT(ts));
    document.getElementById("ac").value="";document.getElementById("pl").value="";
  }catch(e){showMsg("er","Erro: "+e.message);}
  document.getElementById("go").disabled=false;
};
function showMsg(type,txt){
  const el=document.getElementById("msg");
  el.className="msg on "+type;el.textContent=txt;
  if(type==="ok")setTimeout(()=>{el.className="msg";el.textContent="";},5000);
}
</script>
</body></html>
