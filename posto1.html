<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1"/>
<title>Posto 1 — Entrada</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0a0f1e;--c1:#0f1a2e;--c2:#162444;--bd:#1e3558;--b2:#2a4870;--tx:#dff0ff;--t2:#7aafcc;--t3:#3a6880;--ac:#00d4ff;--r:14px;--rs:10px}
body{background:var(--bg);color:var(--tx);font-family:system-ui,-apple-system,sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px}
.box{width:100%;max-width:440px}
.hdr{text-align:center;margin-bottom:28px}
.hdr .ic{font-size:52px;display:block;margin-bottom:8px}
.hdr h1{font-size:20px;font-weight:800;color:var(--ac);letter-spacing:1px;text-transform:uppercase}
.hdr p{font-size:12px;color:var(--t2);margin-top:5px}
.fg{display:flex;flex-direction:column;gap:5px;margin-bottom:14px}
.fg label{font-size:10px;font-weight:700;color:var(--t2);text-transform:uppercase;letter-spacing:.6px}
.fg input{background:var(--c1);border:1.5px solid var(--bd);border-radius:var(--rs);color:var(--tx);padding:14px 16px;font-size:16px;font-family:system-ui,sans-serif;outline:none;transition:border-color .2s;width:100%}
.fg input:focus{border-color:var(--ac)}
.fg input.placa-inp{text-transform:uppercase;letter-spacing:3px;font-weight:700;font-family:monospace;font-size:18px}
.go{width:100%;padding:16px;border:none;border-radius:var(--rs);font-size:16px;font-weight:800;cursor:pointer;text-transform:uppercase;letter-spacing:1px;background:linear-gradient(135deg,var(--ac),#0099bb);color:#000;transition:all .2s;margin-top:6px}
.go:active{transform:scale(.97)}
.go:disabled{opacity:.3;cursor:not-allowed}
.msg{padding:12px 16px;border-radius:var(--rs);font-size:13px;margin-bottom:14px;display:none;text-align:center;font-weight:600}
.msg.on{display:block}
.ok{background:rgba(0,232,150,.1);border:1px solid rgba(0,232,150,.3);color:#00e896}
.er{background:rgba(255,68,102,.1);border:1px solid rgba(255,68,102,.3);color:#ff4466}
.wn{background:rgba(255,208,0,.1);border:1px solid rgba(255,208,0,.3);color:#ffd000}
</style>
</head>
<body>
<div class="box">
  <div class="hdr">
    <span class="ic">🏁</span>
    <h1>Posto 1 — Entrada</h1>
    <p>Digite a AC e a placa do caminhão</p>
  </div>
  <div id="msg" class="msg"></div>
  <div class="fg">
    <label>Número da AC</label>
    <input id="ac" type="text" placeholder="Ex: AC-001" autocomplete="off" oninput="chk()" style="text-transform:uppercase"/>
  </div>
  <div class="fg">
    <label>Placa do Caminhão</label>
    <input id="pl" type="text" placeholder="ABC1234" maxlength="8" autocomplete="off" oninput="chk()" class="placa-inp"/>
  </div>
  <button class="go" id="go" onclick="registrar()" disabled>✅ Registrar Entrada</button>
</div>
<script type="module">
import{initializeApp}from"https://www.gstatic.com/firebasejs/10.11.0/firebase-app.js";import{getFirestore,collection,addDoc,onSnapshot,query,orderBy,updateDoc,doc,Timestamp}from"https://www.gstatic.com/firebasejs/10.11.0/firebase-firestore.js";import{getStorage,ref,uploadString,getDownloadURL}from"https://www.gstatic.com/firebasejs/10.11.0/firebase-storage.js";
const app=initializeApp({apiKey:"AIzaSyCzd3mlF0qlPvw1AwVv3PAt9RXnZQ06sdY",authDomain:"cimento-d887e.firebaseapp.com",projectId:"cimento-d887e",storageBucket:"cimento-d887e.firebasestorage.app",messagingSenderId:"1098178518193",appId:"1:1098178518193:web:8712992a0eda7730ce9690"});
const db=getFirestore(app),storage=getStorage(app);
const hoje=()=>new Date().toISOString().split("T")[0];
const fmtT=d=>d?d.toLocaleTimeString("pt-BR",{hour:"2-digit",minute:"2-digit",second:"2-digit"}):"—";
let HD=[];
onSnapshot(query(collection(db,"caminhoes_rastreio"),orderBy("criadoEm","desc")),snap=>{
  HD=snap.docs.map(d=>{return{id:d.id,...d.data()}}).filter(c=>c.data===hoje());
});
window.chk=()=>{
  const ac=document.getElementById("ac").value.trim();
  const pl=document.getElementById("pl").value.replace(/[^A-Z0-9]/gi,"");
  document.getElementById("go").disabled=!(ac.length>=2&&pl.length>=7);
};
window.registrar=async()=>{
  const ac=document.getElementById("ac").value.trim().toUpperCase();
  const pl=document.getElementById("pl").value.toUpperCase().replace(/[^A-Z0-9]/g,"");
  if(!ac||pl.length<7){showMsg("er","Preencha a AC e a placa.");return;}
  if(HD.find(c=>c.placa===pl&&c.setorAtual!=="concluido")){showMsg("er","Placa "+pl+" já está em processo hoje!");return;}
  document.getElementById("go").disabled=true;
  try{
    const ts=new Date();
    await addDoc(collection(db,"caminhoes_rastreio"),{
      ac,placa:pl,setorAtual:"posto1",
      entrada:{ts:Timestamp.fromDate(ts)},
      triagem:null,carregamento:null,enlonamento:null,faturamento:null,
      data:hoje(),criadoEm:Timestamp.fromDate(ts)
    });
    showMsg("ok","✅ "+pl+" registrado! AC: "+ac+" · "+fmtT(ts));
    document.getElementById("ac").value="";
    document.getElementById("pl").value="";
  }catch(e){showMsg("er","Erro: "+e.message);}
  document.getElementById("go").disabled=false;
};
function showMsg(type,txt){
  const el=document.getElementById("msg");
  el.className="msg on "+type;el.textContent=txt;
  if(type==="ok")setTimeout(()=>{el.className="msg";el.textContent="";},5000);
}
</script>
</body></html>
