<!DOCTYPE html>
<html lang="pt-BR"><head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1"/>
<title>Triagem de Palete</title>
<style>

*{box-sizing:border-box;margin:0;padding:0}
:root{--navy:#0a1628;--teal:#00b4b0;--white:#fff;--gray:#e8eaed;--gray2:#c5cad4;--gray3:#8892a0;--text:#1a2332;--bg:#f0f2f5;--r:8px;--rs:6px}
body{background:var(--bg);color:var(--text);font-family:'Inter',system-ui,sans-serif;min-height:100vh;display:flex;flex-direction:column}
.hdr{background:var(--navy);padding:0 20px;height:56px;display:flex;align-items:center;gap:12px;border-bottom:3px solid var(--teal);flex-shrink:0}
.hic{width:34px;height:34px;background:var(--teal);border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:17px}
.htx{color:var(--white);font-size:15px;font-weight:700;flex:1}
.dot{width:6px;height:6px;background:var(--teal);border-radius:50%;animation:pu 1.5s infinite}
@keyframes pu{0%,100%{opacity:1}50%{opacity:.3}}
.ct{flex:1;display:flex;align-items:center;justify-content:center;padding:20px 16px}
.bx{width:100%;max-width:460px}
.card{background:var(--white);border:1px solid var(--gray);border-radius:var(--r);padding:20px;box-shadow:0 2px 8px rgba(0,0,0,.08);margin-bottom:10px}
.ttl{font-size:14px;font-weight:700;color:var(--navy);margin-bottom:14px;padding-bottom:10px;border-bottom:2px solid var(--gray)}
.btn{width:100%;padding:13px;border:none;border-radius:var(--rs);font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;transition:all .2s;margin-bottom:8px}
.btn:disabled{opacity:.35;cursor:not-allowed}
.btn-navy{background:var(--navy);color:var(--white)}
.btn-green{background:#16a34a;color:var(--white)}
.btn-out{background:transparent;border:1.5px solid var(--gray2);color:var(--gray3)}
.msg{padding:11px 14px;border-radius:var(--rs);font-size:13px;margin-bottom:10px;display:none;font-weight:500}
.msg.on{display:block}
.ok{background:#f0fdf4;border:1px solid #86efac;color:#166534}
.er{background:#fef2f2;border:1px solid #fca5a5;color:#991b1b}
.wn{background:#fffbeb;border:1px solid #fde68a;color:#92400e}
.sec{border:1px solid var(--gray);border-radius:var(--r);padding:14px;margin-bottom:10px}
.sec.ini{border-left:4px solid #f59e0b}
.sec.fim{border-left:4px solid #22c55e;display:none}
.slb{font-size:10px;font-weight:700;color:var(--gray3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:10px}
/* Camera */
.cam{width:100%;background:#f8f9fa;border:2px dashed var(--gray2);border-radius:var(--r);min-height:150px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:7px;position:relative;overflow:hidden;margin-bottom:8px;cursor:pointer;transition:border-color .2s}
.cam.live{border-color:var(--teal);border-style:solid;background:#000;cursor:default}
.cam.done{border-color:#22c55e;border-style:solid}
.cam.fail{border-color:#ef4444;border-style:solid}
.cam video{width:100%;max-height:200px;object-fit:cover;display:none}
.cam.live video{display:block}
.cam img.prev{width:100%;max-height:200px;object-fit:cover;display:none}
.cam.done img.prev,.cam.fail img.prev{display:block}
.cam-ph{display:flex;flex-direction:column;align-items:center;gap:6px;pointer-events:none}
.cam.live .cam-ph,.cam.done .cam-ph,.cam.fail .cam-ph{display:none}
.cam-bar{position:absolute;bottom:0;left:0;right:0;background:rgba(0,0,0,.85);padding:7px 11px;font-size:11px;font-weight:700;color:#fff;display:none;line-height:1.5}
.cam.live .cam-bar,.cam.done .cam-bar,.cam.fail .cam-bar{display:block}
.snap-wrap{display:none;margin-bottom:8px}
.snap-btn{width:100%;padding:12px;border:none;border-radius:var(--rs);background:var(--teal);color:#000;font-size:14px;font-weight:700;cursor:pointer}
.cb{background:#f0fdf4;border:1.5px solid #22c55e;border-radius:var(--r);padding:14px;margin-bottom:8px;display:none}
.cbl{font-size:10px;font-weight:700;color:var(--gray3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px}
.cbp{font-size:32px;font-weight:900;letter-spacing:4px;font-family:monospace;text-align:center;padding:8px;background:var(--white);border-radius:var(--rs);border:1.5px solid var(--gray2);width:100%;color:var(--navy);outline:none;text-transform:uppercase;margin-bottom:8px}
.cbi{font-size:12px;color:#4a5568;text-align:center;line-height:1.7;margin-bottom:3px}
.cbh{font-size:11px;color:var(--gray3);text-align:center}
.err{background:#fef2f2;border:1px solid #fecaca;border-radius:var(--rs);padding:10px 13px;margin-bottom:8px;font-size:12px;color:#991b1b;line-height:1.6;display:none}


.ls{position:fixed;inset:0;background:#0a1628;display:flex;align-items:center;justify-content:center;z-index:9999;padding:20px}
.lb{background:#0d1f3c;border:1px solid #1e3a58;border-radius:12px;padding:32px 28px;width:100%;max-width:340px;text-align:center}
.li{font-size:44px;margin-bottom:10px;display:block}
.lt{font-size:18px;font-weight:800;color:#00b4b0;margin-bottom:4px}
.ls2{font-size:12px;color:#c5cad4;margin-bottom:20px}
.le{background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.3);color:#ef4444;border-radius:8px;padding:10px;font-size:12px;margin-bottom:12px;display:none}
.lf{display:flex;flex-direction:column;gap:4px;margin-bottom:12px;text-align:left}
.lf label{font-size:10px;font-weight:600;color:#8892a0;text-transform:uppercase;letter-spacing:.5px}
.lf input{background:#1a2332;border:1.5px solid #1e3a58;border-radius:6px;color:#e2eeff;padding:11px 13px;font-size:14px;outline:none;width:100%;box-sizing:border-box;font-family:inherit}
.lbtn{width:100%;padding:13px;border:none;border-radius:8px;background:#00b4b0;color:#000;font-size:14px;font-weight:700;cursor:pointer;margin-top:4px}

</style></head><body>
<div class="ls" id="ls">
  <div class="lb">
    <span class="li">📦</span>
    <div class="lt">Triagem de Palete</div>
    <div class="ls2">Acesso restrito</div>
    <div class="le" id="le">Usuário ou senha incorretos</div>
    <div class="lf"><label>Usuário</label><input id="lu" type="text" autocomplete="off" onkeydown="if(event.key==='Enter')doLogin()"/></div>
    <div class="lf"><label>Senha</label><input id="lp" type="password" onkeydown="if(event.key==='Enter')doLogin()"/></div>
    <button class="lbtn" onclick="doLogin()">Entrar</button>
  </div>
</div>
<div class="hdr"><div class="hic">📦</div><div class="htx">Triagem de Palete</div><div class="dot"></div></div>
<div class="ct"><div class="bx">
  <div id="msg" class="msg"></div>
  <!-- INICIO -->
  <div class="sec ini" id="sec-i">
    <div class="slb">▶ Início</div>
    <div class="cam" id="cam-i" onclick="tapCam('i')">
      <video playsinline muted></video>
      <img class="prev"/>
      <div class="cam-ph"><div style="font-size:36px">📷</div><div style="font-size:13px;color:#8892a0;font-weight:500">Toque para abrir câmera</div></div>
      <div class="cam-bar" id="bar-i"></div>
    </div>
    <div class="snap-wrap" id="sw-i"><button class="snap-btn" onclick="doSnap('i')">📸 Fotografar</button></div>
    <div class="err" id="err-i"></div>
    <div class="cb" id="cb-i">
      <div class="cbl">Confirme ou corrija a placa:</div>
      <input class="cbp" id="pl-i" type="text" maxlength="8" oninput="this.value=this.value.toUpperCase().replace(/[^A-Z0-9]/g,'');onEdit('i')"/>
      <div class="cbi" id="ci-i"></div>
      <div class="cbh">Corrija se necessário antes de confirmar</div>
    </div>
    <button class="btn btn-navy" id="go-i" onclick="doS('i')" style="display:none">▶ Confirmar Início</button>
    <button class="btn btn-out" id="rt-i" onclick="resetC('i')" style="display:none">↩ Nova foto</button>
  </div>
  <!-- FIM -->
  <div class="sec fim" id="sec-f">
    <div class="slb">⏹ Fim</div>
    <div class="cam" id="cam-f" onclick="tapCam('f')">
      <video playsinline muted></video>
      <img class="prev"/>
      <div class="cam-ph"><div style="font-size:36px">📷</div><div style="font-size:13px;color:#8892a0;font-weight:500">Toque para abrir câmera</div></div>
      <div class="cam-bar" id="bar-f"></div>
    </div>
    <div class="snap-wrap" id="sw-f"><button class="snap-btn" onclick="doSnap('f')">📸 Fotografar</button></div>
    <div class="err" id="err-f"></div>
    <div class="cb" id="cb-f">
      <div class="cbl">Confirme ou corrija a placa:</div>
      <input class="cbp" id="pl-f" type="text" maxlength="8" oninput="this.value=this.value.toUpperCase().replace(/[^A-Z0-9]/g,'');onEdit('f')"/>
      <div class="cbi" id="ci-f"></div>
      <div class="cbh">Corrija se necessário antes de confirmar</div>
    </div>
    <button class="btn btn-green" id="go-f" onclick="doS('f')" style="display:none">⏹ Confirmar Fim</button>
    <button class="btn btn-out" id="rt-f" onclick="resetC('f')" style="display:none">↩ Nova foto</button>
  </div>
</div></div>
<script type="module">
import{initializeApp}from"https://www.gstatic.com/firebasejs/10.11.0/firebase-app.js";
import{getFirestore,collection,onSnapshot,updateDoc,doc,Timestamp}from"https://www.gstatic.com/firebasejs/10.11.0/firebase-firestore.js";
const app=initializeApp({apiKey:"AIzaSyCMacFP0kGkgOTCqdWzf6Y65LN2q4tw28Y",authDomain:"cimento-6163b.firebaseapp.com",projectId:"cimento-6163b",storageBucket:"cimento-6163b.firebasestorage.app",messagingSenderId:"773785464621",appId:"1:773785464621:web:02dc9de04a7e2af231ada4"});
const db=getFirestore(app);

const _AU="master",_AP="master2026",_SK="triagem";
window.doLogin=async()=>{
  const u=document.getElementById("lu").value.trim().toLowerCase();
  const p=document.getElementById("lp").value.trim();
  document.getElementById("le").style.display="none";
  if(u===_AU&&p===_AP){document.getElementById("ls").style.display="none";return;}
  try{
    const {collection:_c,getDocs,query:_q,where:_w}=await import("https://www.gstatic.com/firebasejs/10.11.0/firebase-firestore.js");
    const snap=await getDocs(_q(_c(db,"usuarios"),_w("usuario","==",u),_w("senha","==",p),_w("setor","==",_SK)));
    if(!snap.empty){document.getElementById("ls").style.display="none";return;}
  }catch(e){console.error(e);}
  document.getElementById("le").style.display="block";
};


let _str=null;
async function openCam(id,bid){
  const a=document.getElementById(id),v=a.querySelector("video");
  try{
    if(_str){_str.getTracks().forEach(t=>t.stop());_str=null;}
    _str=await navigator.mediaDevices.getUserMedia({video:{facingMode:"environment"},audio:false});
    v.srcObject=_str;v.style.display="block";await v.play();
    a.classList.remove("fail","done");a.classList.add("live");
    document.getElementById(bid).textContent="📷 Câmera ativa — clique em Fotografar";
  }catch(e){sm("er","Câmera não disponível: "+e.message);}
}
function snapPic(id,bid){
  const a=document.getElementById(id),v=a.querySelector("video"),p=a.querySelector("img.prev");
  const c=document.createElement("canvas");c.width=v.videoWidth||1280;c.height=v.videoHeight||720;
  c.getContext("2d").drawImage(v,0,0);
  const b64=c.toDataURL("image/jpeg",.93);
  if(_str){_str.getTracks().forEach(t=>t.stop());_str=null;}
  v.style.display="none";p.src=b64;
  a.classList.remove("live");a.classList.add("done");
  document.getElementById(bid).textContent="✅ Foto capturada";
  return b64;
}
async function callAPI(b64){
  try{
    const r=await fetch("/api/placa",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({image:b64.split(",")[1]})});
    const d=await r.json();
    if(!r.ok)return{ok:false,err:d.error||"Erro "+r.status};
    if(d.placa)return{ok:true,placa:d.placa};
    return{ok:false,err:"Placa não identificada"};
  }catch(e){return{ok:false,err:"Erro de conexão"};}
}

const hoje=()=>new Date().toLocaleDateString("pt-BR",{timeZone:"America/Fortaleza"}).split("/").reverse().join("-");
const fmtT=d=>d.toLocaleTimeString("pt-BR",{hour:"2-digit",minute:"2-digit",second:"2-digit"});
const B={},TS={},DC={};let HD=[];
onSnapshot(collection(db,"caminhoes_rastreio"),s=>{HD=s.docs.map(d=>{return{id:d.id,...d.data()}}).filter(c=>c.data===hoje());});
function find(pl){return HD.find(d=>d.placa===pl&&d.setorAtual!=="concluido")||null;}
function sm(t,x){const e=document.getElementById("msg");e.className="msg on "+t;e.textContent=x;if(t==="ok")setTimeout(()=>e.className="msg",7000);}
function se(id,h){const e=document.getElementById(id);if(e){e.style.display=h?"block":"none";if(h)e.innerHTML=h;}}

window.tapCam=async t=>{
  const a=document.getElementById("cam-"+t);
  if(a.classList.contains("live")||a.classList.contains("done"))return;
  await openCam("cam-"+t,"bar-"+t);
  document.getElementById("sw-"+t).style.display="block";
};

window.doSnap=async t=>{
  document.getElementById("sw-"+t).style.display="none";
  const b64=snapPic("cam-"+t,"bar-"+t);
  B[t]=b64;TS[t]=new Date();
  document.getElementById("bar-"+t).textContent="🤖 Lendo placa...";
  se("err-"+t,null);document.getElementById("cb-"+t).style.display="none";
  document.getElementById("go-"+t).style.display="none";document.getElementById("rt-"+t).style.display="none";
  const res=await callAPI(b64);
  if(!res.ok){
    document.getElementById("cam-"+t).classList.remove("done");document.getElementById("cam-"+t).classList.add("fail");
    document.getElementById("bar-"+t).textContent="❌ "+res.err;
    se("err-"+t,res.err+"<br><small>Tente foto mais próxima com boa iluminação</small>");
    document.getElementById("rt-"+t).style.display="block";return;
  }
  const pl=res.placa;
  document.getElementById("bar-"+t).textContent="✅ Lido: "+pl+" · "+fmtT(TS[t]);
  document.getElementById("pl-"+t).value=pl;DC[t]=find(pl);
  document.getElementById("ci-"+t).innerHTML=DC[t]?"✅ AC: "+DC[t].ac+" · Setor: "+DC[t].setorAtual.replace(/_/g," "):"⚠️ Não encontrado hoje";
  document.getElementById("cb-"+t).style.display="block";
  document.getElementById("go-"+t).style.display="block";document.getElementById("rt-"+t).style.display="block";
};

window.onEdit=t=>{
  const pl=document.getElementById("pl-"+t).value;DC[t]=find(pl);
  document.getElementById("ci-"+t).innerHTML=DC[t]?"✅ AC: "+DC[t].ac+" · Setor: "+DC[t].setorAtual.replace(/_/g," "):"⚠️ Não encontrado hoje";
};

window.doS=async t=>{
  const pl=document.getElementById("pl-"+t).value.toUpperCase().replace(/[^A-Z0-9]/g,"");
  if(pl.length<5){sm("er","Placa inválida.");return;}
  const c=find(pl);if(!c){sm("er","Caminhão "+pl+" não encontrado hoje.");return;}
  document.getElementById("go-"+t).disabled=true;
  try{
    const u={};
    u["triagem."+(t==="i"?"inicio":"fim")]=Timestamp.fromDate(TS[t]);
    u.ac=c.ac;u.setorAtual=t==="i"?"triagem_inicio":"triagem_fim";
    await updateDoc(doc(db,"caminhoes_rastreio",c.id),u);
    sm("ok","✅ "+pl+" · AC: "+c.ac+" · "+(t==="i"?"Início":"Fim")+": "+fmtT(TS[t]));
    if(t==="i"){
      document.getElementById("sec-f").style.display="block";
      document.getElementById("sec-i").style.opacity="0.4";
      document.getElementById("sec-i").style.pointerEvents="none";
    }else{
      document.getElementById("sec-f").style.display="none";
      document.getElementById("sec-i").style.opacity="1";
      document.getElementById("sec-i").style.pointerEvents="auto";
    }
    resetC(t);
  }catch(e){sm("er","Erro: "+e.message);document.getElementById("go-"+t).disabled=false;}
};

window.resetC=t=>{
  const a=document.getElementById("cam-"+t);
  a.classList.remove("live","done","fail");
  a.querySelector("video").style.display="none";
  const p=a.querySelector("img.prev");p.src="";
  document.getElementById("bar-"+t).style.display="none";document.getElementById("bar-"+t).textContent="";
  document.getElementById("sw-"+t).style.display="none";
  document.getElementById("cb-"+t).style.display="none";
  document.getElementById("go-"+t).style.display="none";document.getElementById("go-"+t).disabled=false;
  document.getElementById("rt-"+t).style.display="none";
  se("err-"+t,null);delete B[t];delete TS[t];delete DC[t];
  document.getElementById("msg").className="msg";
};
</script></body></html>
